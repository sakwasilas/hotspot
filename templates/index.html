<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SwiftWave Hotspot | Premium WiFi Plans — Neon Pulse</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 10%, #070b17, #010409);
            min-height: 100vh;
            color: #f0f3fa;
            line-height: 1.4;
            padding: 2rem 1rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 255, 200, 0.03), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: floatReveal 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatReveal {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* =========================
           TITLE BOX
        ========================== */
        .title-box {
            background: rgba(8, 15, 28, 0.55);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 180, 0.4);
            border-radius: 80px;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 20px 38px -12px rgba(0, 255, 170, 0.2), inset 0 1px 0 rgba(255,255,240,0.1);
        }

        .title-box h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #D6FFE0, #6effb0, #1eff8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* =========================
           INSTRUCTION BOX
        ========================== */
        .instruction-box {
            background: rgba(10, 18, 28, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.6rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(0, 210, 150, 0.4);
        }

        /* =========================
           🔥 UL PREMIUM STYLE (NEW)
        ========================== */
        ul {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0;
            background: rgba(8, 18, 30, 0.6);
            border-radius: 1.8rem;
            border: 1px solid rgba(0, 255, 150, 0.25);
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 30px -12px rgba(0, 255, 170, 0.12);
            overflow: hidden;
        }

        ul li {
            padding: 1rem 1.4rem;
            font-weight: 500;
            color: #eafff6;
            position: relative;
            border-bottom: 1px solid rgba(0, 255, 150, 0.08);
            transition: all 0.25s ease;
            opacity: 0;
            transform: translateY(10px);
            animation: ulFadeIn 0.4s ease forwards;
        }

        ul li:last-child {
            border-bottom: none;
        }

        ul li:hover {
            background: rgba(0, 255, 150, 0.08);
            padding-left: 1.8rem;
        }

        ul li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(180deg, #00ffa6, #00d4ff);
            transition: width 0.25s ease;
        }

        ul li:hover::before {
            width: 5px;
        }

        ul li i {
            margin-right: 10px;
            color: #63ffb2;
            filter: drop-shadow(0 0 4px #00ff9c);
        }

        @keyframes ulFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================
           YOUR ORIGINAL STYLES BELOW (UNCHANGED)
           (kept as-is for safety)
        ========================== */

        .packages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .card {
            background: radial-gradient(circle at 0% 20%, rgba(20, 28, 45, 0.9), rgba(5, 10, 20, 0.96));
            border-radius: 2.2rem;
            padding: 2rem 1.2rem;
            text-align: center;
            border: 1px solid rgba(0, 230, 140, 0.3);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title-box">
        <h1><i class="fas fa-wifi"></i> SwiftWave Hotspot</h1>
    </div>

    <div class="instruction-box">
        <h2><i class="fas fa-shopping-cart"></i> How To Purchase</h2>

        <!-- Example UL (now beautifully styled) -->
        <ul>
            <li><i class="fas fa-hand-pointer"></i> Tap your package</li>
            <li><i class="fas fa-mobile-alt"></i> Enter phone number</li>
            <li><i class="fas fa-credit-card"></i> Click PAY NOW</li>
            <li><i class="fas fa-key"></i> Enter M-Pesa PIN</li>
        </ul>

    </div>

</div>

</body>
</html>
