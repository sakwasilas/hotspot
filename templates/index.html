<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SwiftWave Hotspot | Premium WiFi Plans</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617, #050d1a 40%, #020617);
            min-height: 100vh;
            color: #e6edf7;
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 10%, rgba(0,255,170,0.08), transparent 40%),
                        radial-gradient(circle at 20% 90%, rgba(0,150,255,0.08), transparent 40%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            animation: fadeSlideUp 0.6s ease;
        }

        .title-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border-radius: 50px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .title-box h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 800;
            background: linear-gradient(90deg, #00ffa6, #00c3ff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .instruction-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .instruction-box h2 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ffffff, #9ae6b4);
            -webkit-background-clip: text;
            color: transparent;
        }

        .instruction-steps {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .step-item {
            flex: 1;
            min-width: 150px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.25s;
        }

        .step-item:hover {
            transform: translateY(-4px);
            border-color: #00ffa6;
        }

        .packages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border-radius: 22px;
            padding: 1.6rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #00ffa6;
            box-shadow: 0 0 25px rgba(0,255,166,0.15);
        }

        .card h3 {
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #00ffa6;
            margin: 0.6rem 0;
        }

        .speed {
            font-size: 1rem;
            background: rgba(0,255,166,0.1);
            color: #9ae6b4;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .card button {
            background: linear-gradient(90deg, #00ffa6, #00c3ff);
            border: none;
            color: #001018;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 999px;
            cursor: pointer;
            width: 100%;
            transition: 0.25s;
        }

        .card button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,166,0.4);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #050d1a;
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            margin-top: 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #020617;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 1.2rem;
            justify-content: center;
        }

        .btn-pay {
            background: #00ffa6;
            color: #001018;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            opacity: 0.6;
            font-size: 0.8rem;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 680px) {
            .instruction-steps {
                flex-direction: column;
            }
        }
    </style>
</head>
