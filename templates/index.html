<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SwiftWave Hotspot | Premium WiFi Plans</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb, #f1f5f9, #d1d5db);
            min-height: 100vh;
            color: #1f2937;
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 10%, rgba(255,255,255,0.4), transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .title-box {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .title-box h1 {
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 800;
            color: #111827;
        }

        .title-box h1 i {
            color: #22c55e;
        }

        .instruction-box {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .instruction-box h2 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            font-weight: 700;
            color: #111827;
        }

        .instruction-steps {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .step-item {
            flex: 1;
            min-width: 150px;
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            transition: 0.2s;
        }

        .step-item:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        .step-item i {
            font-size: 1.5rem;
            color: #22c55e;
            margin-bottom: 6px;
        }

        .step-item p {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .contact {
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
            color: #16a34a;
            cursor: pointer;
        }

        .packages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem 1.2rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.12);
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
            color: #111827;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #16a34a;
            margin: 0.5rem 0;
        }

        .speed {
            margin: 0.8rem 0 1.2rem;
            font-size: 1rem;
            color: #4b5563;
        }

        .card button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 999px;
            cursor: pointer;
            width: 85%;
            transition: 0.2s;
        }

        .card button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(34,197,94,0.3);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: 0.3s;
        }

        .active .modal-card {
            transform: scale(1);
        }

        .modal-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            margin: 1rem 0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-pay {
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 999px;
        }

        .btn-cancel {
            background: #e5e7eb;
            padding: 10px 20px;
            border-radius: 999px;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .instruction-steps {
                flex-direction: column;
            }

            .card button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .card {
                padding: 1.4rem 1rem;
            }

            .price {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
